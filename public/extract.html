<!DOCTYPE html>
<html>
<head>
    <title>Color Extractor</title>
</head>
<body>
    <img id="img" src="/src/assets/LOGOBADKOM.png" crossorigin="anonymous" onload="extractColors()">
    <div id="output"></div>
    <script>
        function extractColors() {
            const img = document.getElementById('img');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0, img.width, img.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const colors = {};
            
            for (let i = 0; i < imageData.length; i += 4) {
                const r = imageData[i];
                const g = imageData[i+1];
                const b = imageData[i+2];
                const a = imageData[i+3];
                
                if (a > 128) { // ignore transparent pixels
                    const hex = '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
                    colors[hex] = (colors[hex] || 0) + 1;
                }
            }
            
            // Sort colors by frequency
            const sortedColors = Object.keys(colors).sort((a, b) => colors[b] - colors[a]);
            document.getElementById('output').innerText = 'Top colors: ' + sortedColors.slice(0, 5).join(', ');
        }
    </script>
</body>
</html>
